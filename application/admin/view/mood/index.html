<div class="panel panel-default panel-intro">
    {:build_heading()}
    <div class="panel-heading" style='background-image:linear-gradient( 135deg, #66B3FF 10%, #0066CC 100%) !important;'>
        <div class="panel-lead" style='color:#0066CC'><em>修改提运单状态</em></div>
    </div>
    <div class="panel-body">

        <form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST"
              action="">
                <div class="form-group">
                    <label class="control-label col-xs-12 col-sm-2">{:__('提运单号')}:</label>
                    <div class="col-xs-12 col-sm-8">
                        <select name="row[billNo]" id="myselect" class="form-control">
                            {volist name="list" id="vo"}
                            <option value="{$vo.billNo}">{$vo.billNo}</option>
                            {/volist}
                        </select>
                    </div>
                </div>
            <div class="form-group">
                <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
                <div class="col-xs-12 col-sm-8">
                 <div class="radio">
                   <label><input  name="row[status]" type="radio" value="0"/>待报关</label>
                   <label><input  name="row[status]" type="radio" value="1"/>三单完成</label>
                   <label><input  name="row[status]" type="radio" value="2"/>603完成</label>
                   <label><input  name="row[status]" type="radio" value="3"/>607总分单完成</label>
                   <label><input  name="row[status]" type="radio" value="4"/>507运抵完成</label>
                   <label><input  name="row[status]" type="radio" value="5"/>509离境完成</label>
                   <label><input  name="row[status]" type="radio" value="6"/>605撤单完成</label>
                    </div>
                </div>
            </div>

            <label class="control-label col-xs-12 col-sm-2"></label>
            <div class="col-xs-12 col-sm-8">
                <button type="submit" class="btn btn-primary btn-embossed">{:__('确定')}</button>
                <button type="reset" class="btn  btn-default btn-embossed">{:__('Reset')}</button>
            </div>

        </form>
    </div>
</div>
</div>
