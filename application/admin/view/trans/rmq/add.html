<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Ebcname')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-ebcname" data-rule="required" class="form-control" name="row[ebcname]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Host')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-host" data-rule="required" class="form-control" name="row[host]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Port')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-port" data-rule="required" class="form-control" name="row[port]" type="number" value="21">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('User')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user" data-rule="required" class="form-control" name="row[user]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Pwd')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-pwd" data-rule="required" class="form-control" name="row[pwd]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Vhost')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-vhost" class="form-control" name="row[vhost]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('ExchangeN')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-exchangeN" data-rule="required" class="form-control" name="row[exchangeN]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('QueueNsend')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-queueNsend" data-rule="required" class="form-control" name="row[queueNsend]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('QueueNreceive')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-queueNreceive" data-rule="required" class="form-control" name="row[queueNreceive]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Note')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-note" class="form-control" name="row[note]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('DxpId')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-dxpId" class="form-control" name="row[dxpId]" type="text">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
