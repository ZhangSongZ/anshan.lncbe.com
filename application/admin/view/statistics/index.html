<div class="panel panel-default panel-intro">
    {:build_heading()}

    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}" ><i class="fa fa-refresh"></i> </a>
                        <a href="javascript:;" class="btn btn-success btn-add {:$auth->check('statistics/add')?'':'hide'}" title="{:__('Add')}" ><i class="fa fa-plus"></i> {:__('Add')}</a>
                        <a href="javascript:;" class="btn btn-success btn-edit btn-disabled disabled {:$auth->check('statistics/edit')?'':'hide'}" title="{:__('Edit')}" ><i class="fa fa-pencil"></i> {:__('Edit')}</a>
                        <a href="javascript:;" class="btn btn-danger btn-del btn-disabled disabled {:$auth->check('statistics/del')?'':'hide'}" title="{:__('Delete')}" ><i class="fa fa-trash"></i> {:__('Delete')}</a>
                        
                       <a href="javascript:;" class="btn btn-default" style="font-size:14px;color:#fff;border-radius: 4px;background-color: #18adbc">
                            <span class="extend">
                             总单数：<span id="count">0</span>
                        </span>
                        </a>
                        <a href="javascript:;" class="btn btn-default" style="font-size:14px;color:#fff;border-radius: 4px;background-color: #18adbc">
                            <span class="extend">
                             总贸易额：<span id="counts">0</span>（美元）
                        </span>
                        </a>
                        

                        
                    </div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap"
                           data-operate-edit="{:$auth->check('statistics/edit')}"
                           data-operate-del="{:$auth->check('statistics/del')}"
                           width="100%">
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
