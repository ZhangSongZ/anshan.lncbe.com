<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('EbcCode')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-ebcCode" data-rule="required" class="form-control" name="row[ebcCode]" type="text" value="{$row.ebcCode|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('EbcName')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-ebcName" data-rule="required" class="form-control" name="row[ebcName]" type="text" value="{$row.ebcName|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Social_code')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-social_code" data-rule="required" class="form-control" name="row[social_code]" type="text" value="{$row.social_code|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
