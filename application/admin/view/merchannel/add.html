        <script>
            // 页面加载完成后执行
            $(function () {
                // 监听上级下拉框的 change 事件
                $('#c-parent_id1').on('change', function () {
                    var parentId = $(this).val(); // 获取当前选中的父级ID
                    var $childrenSelect = $('#c-children_id1');
                    
                    if (!parentId) {
                        // 如果未选择父级，清空子级选项并禁用
                        $childrenSelect.empty().append('<option value="">请先选择上级</option>');
                        $childrenSelect.selectpicker('refresh');
                        return;
                    }
                    
                    // 显示加载状态（可选）
                   //  $childrenSelect.prop('disabled', true).selectpicker('refresh');
                    
                    // 发送Ajax请求到后端接口
                    $.ajax({
                        url: '{:url("merchannel/getChildrenOptions")}', // 替换为您的控制器和方法名[ref_3]
                        type: 'GET',
                        dataType: 'json',
                        data: {pid: parentId}, // 传递父级ID作为参数[ref_1]
                        success: function (result) {
                            if (result.code == 1) {
                                
                                // 成功获取数据
                                var options = '<option value="">请选择</option>';
                                $.each(result.list, function(i, item) {
                                   
                                    // 动态拼接子选项，确保 value 和 text 字段对应[ref_6]
                                    console.log(item);
                                    options += '<option value="' + item.value + '">' + item.text + '</option>';
                                });
                                $childrenSelect.html(options); // 更新子级下拉框
                            } else {
                                // 请求失败或数据为空
                                $childrenSelect.empty().append('<option value="">' + result.msg + '</option>');
                            }
                            // 刷新Bootstrap-select插件显示
                            $childrenSelect.selectpicker('refresh');
                            // $childrenSelect.prop('disabled', false).selectpicker('refresh');
                        },
                        error: function () {
                            // Ajax请求失败处理
                            $childrenSelect.empty().append('<option value="">数据加载失败</option>').selectpicker('refresh');
                        }
                    });
                });
                
                // 如果是编辑页面，页面加载时可能需要根据已有的parent_id自动触发一次change事件，以回填子级数据
                // var initialParentId = $('#c-parent_id').val();
                // if (initialParentId) {
                //     $('#c-parent_id').trigger('change');
                // }
            });
            </script>

                            $.each(result.list, function(i, item) {
                               
                                // 动态拼接子选项，确保 value 和 text 字段对应[ref_6]
                                console.log(item);
                                options += '<option value="' + item.value + '">' + item.text + '</option>';
                            });
                            $childrenSelect.html(options); // 更新子级下拉框
                        } else {
                            // 请求失败或数据为空
                            $childrenSelect.empty().append('<option value="">' + result.msg + '</option>');
                        }
                        // 刷新Bootstrap-select插件显示
                        $childrenSelect.selectpicker('refresh');
                        // $childrenSelect.prop('disabled', false).selectpicker('refresh');
                    },
                    error: function () {
                        // Ajax请求失败处理
                        $childrenSelect.empty().append('<option value="">数据加载失败</option>').selectpicker('refresh');
                    }
                });
            });
            
            // 如果是编辑页面，页面加载时可能需要根据已有的parent_id自动触发一次change事件，以回填子级数据
            // var initialParentId = $('#c-parent_id').val();
            // if (initialParentId) {
            //     $('#c-parent_id').trigger('change');
            // }
        });
        </script>
